<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca de Letras</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    /* =====================
       BASE / FUNDO
    ===================== */
    body {
      min-height: 100vh;
      padding-top: 12px; /* leve afastamento do topo */
      background: linear-gradient(135deg, #1d2671, #c33764);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }


    /* =====================
       CONTAINER PRINCIPAL
    ===================== */
    .container {
      max-width: 820px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    /* =====================
       TÍTULO
    ===================== */
    h4 {
      font-weight: 700;
      letter-spacing: 0.3px;
      text-align: center;
      margin-bottom: 24px;
      color: #2b2b2b;
    }

    /* =====================
       INPUTS / SELECT
    ===================== */
    input.form-control,
    select.form-select {
      min-height: 48px;
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    input.form-control:focus,
    select.form-select:focus {
      border-color: #6f42c1;
      box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.25);
    }

    @media (max-width: 600px) {
      input.form-control,
      select.form-select {
        min-height: 56px;
        font-size: 18px;
      }
    }

    /* =====================
       CONTADOR
    ===================== */
    #musicCount {
      font-size: 14px;
      color: #6c757d;
      white-space: nowrap;
    }

    /* =====================
       LISTA DE ARTISTAS
    ===================== */
    #artistList .list-group-item {
      border-radius: 10px;
      margin-bottom: 6px;
      transition: all 0.2s ease;
    }

    #artistList .list-group-item:hover {
      background: #6f42c1;
      color: #fff;
      transform: translateX(4px);
    }

    /* =====================
       LOADER
    ===================== */
    #loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      font-size: 15px;
      color: #555;
    }

    #loader img {
      height: 56px;
      width: auto;
    }

    /* =====================
       IFRAME
    ===================== */
    iframe {
      border-radius: 14px;
      border: none;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    iframe:hover {
      transform: scale(1.005);
    }

    #clearArtist {
      font-size: 18px;
      line-height: 1;
    }

    #clearArtist:focus {
      box-shadow: none;
    }

  </style>
</head>

<body>

  <div class="container mt-3 mb-4">

  <h4>Buscar letras de músicas</h4>

  <!-- ARTISTA -->
  <div class="d-flex align-items-center gap-3 mb-3">
    <div class="input-group">
      <input
        id="artist"
        class="form-control"
        placeholder="Digite o nome do artista"
      >
      <button
        id="clearArtist"
        class="btn btn-outline-secondary"
        type="button"
        title="Limpar"
      >
        ✕
      </button>
    </div>
    <span id="musicCount"></span>
  </div>
  

  <div id="artistList" class="list-group mb-4"></div>

  <!-- SELECT DE MÚSICAS -->
  <div class="mb-3">
    <select id="musicSelect" class="form-select" disabled>
      <option>Selecione a música</option>
    </select>
  </div>

  <!-- LOADER -->
  <div id="loader">
    <span>Obtendo músicas do artista...</span>
    <img
      src="https://gifsboom.net/wp-content/uploads/2018/12/cat-circles.gif"
      alt="Carregando"
    >
  </div>

  <!-- IFRAME -->
  <iframe
    id="iframe"
    class="w-100 mt-4"
    style="height:70vh; display:none"
  ></iframe>

</div>

<!-- =====================
     JAVASCRIPT (INALTERADO)
===================== -->
<script>
function jsonp(url, callback) {
  const cbName = "cb_" + Math.random().toString(36).substring(2);

  window[cbName] = function (data) {
    callback(data);
    delete window[cbName];
    script.remove();
  };

  const script = document.createElement("script");
  script.src = url + "&output=jsonp&callback=" + cbName;
  document.body.appendChild(script);
}

let selectedArtist = null;
let artistTimeout  = null;
let todasMusicas   = [];

$("#artist").on("input", function () {
  clearTimeout(artistTimeout);

  const q = $(this).val().trim();

  $("#artistList").empty();
  $("#musicSelect").html(`<option>Selecione a música</option>`).prop("disabled", true);
  $("#iframe").hide();
  $("#loader").hide();
  $("#musicCount").text("");
  todasMusicas = [];

  if (q.length < 2) return;

  artistTimeout = setTimeout(() => buscarArtista(q), 300);
});

function buscarArtista(nome) {
  jsonp(
    `https://api.deezer.com/search/artist?q=${encodeURIComponent(nome)}`,
    data => {
      $("#artistList").empty();
      if (!data || !data.data) return;

      data.data.slice(0, 5).forEach(a => {
        $("<button>")
          .addClass("list-group-item list-group-item-action")
          .text(a.name)
          .on("click", function () {
            selectedArtist = a;
            $("#artist").val(a.name);
            $("#artistList").empty();
            buscarTodasMusicasDoArtista();
          })
          .appendTo("#artistList");
      });
    }
  );
}

async function buscarTodasMusicasDoArtista() {
  $("#loader").css("display", "flex");
  $("#musicSelect").html(`<option>Carregando...</option>`).prop("disabled", true);
  $("#musicCount").text("");
  todasMusicas = [];

  await new Promise(r => setTimeout(r, 0));

  let index = 0;
  let continuar = true;
  const set = new Set();

  while (continuar) {
    await new Promise(resolve => {
      jsonp(
        `https://api.deezer.com/artist/${selectedArtist.id}/top?index=${index}`,
        data => {
          if (!data || !data.data || data.data.length === 0) {
            continuar = false;
            resolve();
            return;
          }

          data.data.forEach(m => set.add(m.title));
          index += data.data.length;
          resolve();
        }
      );
    });
  }

  todasMusicas = [...set].sort();
  renderizarSelect(todasMusicas);

  $("#musicCount").text(`(${todasMusicas.length} músicas)`);
  $("#loader").hide();
  $("#musicSelect").prop("disabled", false);
}

function renderizarSelect(lista) {
  const $select = $("#musicSelect");
  $select.empty().append(`<option>Selecione a música</option>`);

  lista.forEach(titulo => {
    $("<option>").val(titulo).text(titulo).appendTo($select);
  });
}

$("#musicSelect").on("change", function () {
  const titulo = $(this).val();
  if (!titulo) return;
  carregarIframe(selectedArtist.name, titulo);
});

function carregarIframe(artista, musica) {
  $("#iframe")
    .attr("src", `https://www.vagalume.com.br/${normalizar(artista)}/${normalizar(musica)}.html`)
    .show();
}

function normalizar(texto) {
  return texto
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\(.*?\)/g, "")            // remove (Live), (Remastered)
    .replace(/[^a-zA-Z0-9\s-]/g, "")    // 🔥 mantém hífen
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "-");              // espaços viram hífen
}

$("#clearArtist").on("click", function () {
  $("#artist").val("").focus();
  $("#artistList").empty();
  $("#musicSelect")
    .html(`<option>Selecione a música</option>`)
    .prop("disabled", true);

  $("#iframe").hide();
  $(".zoom-controls").hide();
  $("#loader").hide();
  $("#musicCount").text("");

  todasMusicas = [];
  selectedArtist = null;
});

</script>

</body>
</html>
